name: Build & Deploy
 
on:
  push:
    branches: [main]
 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      
uses: actions/checkout@v4

name: Login to Docker Hub
uses: docker/login-action@v3
with:
  username: ${{ secrets.DOCKER_HUB_USER }}
  password: ${{ secrets.DOCKER_PASSW }}

name: Build and push image
uses: docker/build-push-action@v5
with:
  push: true
  tags: ${{ secrets.DOCKER_HUB_USER }}/telegram-bot:latest

deploy:
  needs: build-and-push
  runs-on: ubuntu-latest
  steps:
name: Deploy via SSH
    uses: appleboy/ssh-action@v1
    with:
      host: ${{ secrets.SSH_HOST }}
      username: ${{ secrets.SSH_USER }}
      key: ${{ secrets.SSH_PRIVATE_KEY }}
      script: |
        docker pull ${{ secrets.DOCKER_HUB_USER }}/telegram-bot:latest
        docker stop telegram-bot || true
        docker rm   telegram-bot || true
        docker run -d --name telegram-bot --restart unless-stopped -e BOT_TOKEN=${{ secrets.BOT_TOKEN }} ${{ secrets.DOCKERHUB_USER }}/telegram-bot:latest
